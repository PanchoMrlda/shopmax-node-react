version: '3.8'
services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: always
    ports:
      - "${DATABASE_PORT}:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: backend
    restart: always
    ports:
      - "${BACKEND_PORT}:5000"
    env_file:
      - ./.env
    depends_on:
      - mongo
    volumes:
      - ./backend/src:/usr/src/app/src
      - ./.env:/usr/src/app/.env

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo-data:
